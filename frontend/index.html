<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ePSA Biopsy Prediction</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #111;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 36px 40px;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 28px;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: #333;
    }

    .hint {
      font-size: 0.75rem;
      color: #888;
      margin-top: 3px;
    }

    input, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.15s;
    }

    input:focus, select:focus {
      border-color: #5b21b6;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #5b21b6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }

    button:hover { background: #4c1d95; }
    button:disabled { background: #a78bfa; cursor: default; }

    #result {
      margin-top: 28px;
      display: none;
    }

    .prob-display {
      text-align: center;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 16px;
    }

    .prob-display .pct {
      font-size: 3rem;
      font-weight: 800;
      line-height: 1;
    }

    .prob-display .label {
      font-size: 0.8rem;
      margin-top: 4px;
      opacity: 0.8;
    }

    .risk-low    { background: #dcfce7; color: #166534; }
    .risk-below  { background: #fef9c3; color: #713f12; }
    .risk-mid    { background: #ffedd5; color: #9a3412; }
    .risk-high   { background: #fee2e2; color: #991b1b; }

    .interpretation {
      font-size: 0.9rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 16px;
    }

    .details {
      font-size: 0.8rem;
      color: #555;
      border-top: 1px solid #eee;
      padding-top: 14px;
    }

    .details div {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
    }

    .details .key { color: #888; }
    .details .val { font-weight: 500; color: #222; }

    .error {
      color: #991b1b;
      font-size: 0.85rem;
      margin-top: 12px;
    }

    .disclaimer {
      font-size: 0.72rem;
      color: #999;
      margin-top: 24px;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>ePSA Biopsy Prediction</h1>
    <p class="subtitle">GG&#x2265;2 prostate cancer risk &mdash; Model v3 &middot; AUC 0.703</p>

    <div class="field">
      <label for="psa">PSA (ng/mL)</label>
      <input type="number" id="psa" min="0.1" step="0.1" placeholder="e.g. 5.2" />
    </div>

    <div class="field">
      <label for="pirads">PI-RADS Score</label>
      <select id="pirads">
        <option value="">Select&hellip;</option>
        <option value="1">1 &mdash; Very low</option>
        <option value="2">2 &mdash; Low</option>
        <option value="3">3 &mdash; Intermediate</option>
        <option value="4">4 &mdash; High</option>
        <option value="5">5 &mdash; Very high</option>
      </select>
    </div>

    <div class="field">
      <label for="volume">Prostate Volume (mL) <span style="font-weight:400;color:#888">&mdash; optional</span></label>
      <input type="number" id="volume" min="1" step="1" placeholder="e.g. 40" />
      <p class="hint">Used to compute PSAD. Enables v3 model; omit to use v2 fallback.</p>
    </div>

    <button id="submitBtn" onclick="predict()">Calculate Risk</button>
    <div id="error" class="error"></div>

    <div id="result">
      <div id="probDisplay" class="prob-display">
        <div id="pct" class="pct"></div>
        <div class="label">P(Grade Group &#x2265;2)</div>
      </div>
      <div id="interp" class="interpretation"></div>
      <div class="details" id="details"></div>
    </div>

    <p class="disclaimer">For clinical decision support only. Not a replacement for physician judgment.<br>AUC 0.703 OOF (5-fold &times; 100 repeats), N=120, threshold 0.30.</p>
  </div>

  <script>
    async function predict() {
      const psa = parseFloat(document.getElementById("psa").value);
      const pirads = parseInt(document.getElementById("pirads").value);
      const volumeRaw = document.getElementById("volume").value;
      const volume = volumeRaw ? parseFloat(volumeRaw) : null;

      document.getElementById("error").textContent = "";

      if (!psa || psa <= 0) { showError("Enter a valid PSA value."); return; }
      if (!pirads) { showError("Select a PI-RADS score."); return; }

      const btn = document.getElementById("submitBtn");
      btn.disabled = true;
      btn.textContent = "Calculating…";

      try {
        const body = { psa, pirads };
        if (volume && volume > 0) body.prostate_volume = volume;

        const res = await fetch("/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });

        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        showResult(data);
      } catch (e) {
        showError("Request failed: " + e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = "Calculate Risk";
      }
    }

    function showResult(d) {
      const resultEl = document.getElementById("result");
      resultEl.style.display = "block";

      const pct = d.percent;
      document.getElementById("pct").textContent = pct.toFixed(1) + "%";
      document.getElementById("interp").textContent = d.interpretation;

      const display = document.getElementById("probDisplay");
      display.className = "prob-display " + riskClass(d.prob);

      const rows = [
        ["Model", d.model_version],
        ["Decision threshold", (d.threshold * 100).toFixed(0) + "%"],
        ["Guideline GG≥2 rate (PI-RADS " + document.getElementById("pirads").value + ")", d.guideline_rate],
      ];
      if (d.psad !== null) rows.push(["PSAD", d.psad.toFixed(3) + " ng/mL²"]);
      if (d.psad_tier) rows.push(["PSAD tier", d.psad_tier]);

      document.getElementById("details").innerHTML = rows
        .map(([k, v]) => `<div><span class="key">${k}</span><span class="val">${v}</span></div>`)
        .join("");
    }

    function riskClass(prob) {
      if (prob < 0.20) return "risk-low";
      if (prob < 0.30) return "risk-below";
      if (prob < 0.45) return "risk-mid";
      return "risk-high";
    }

    function showError(msg) {
      document.getElementById("error").textContent = msg;
      document.getElementById("result").style.display = "none";
    }

    document.addEventListener("keydown", e => {
      if (e.key === "Enter") predict();
    });
  </script>
</body>
</html>
